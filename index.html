<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMV 日报生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#1a1a4e 30%,#24243e 60%,#0f0c29 100%);min-height:100vh;padding:20px;color:#e0e0e0}
.container{max-width:960px;margin:0 auto}
.header{text-align:center;margin-bottom:36px;padding-top:20px}
.badge{display:inline-block;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:5px 16px;font-size:12px;color:#a5b4fc;margin-bottom:16px;letter-spacing:1px}
.header h1{font-size:34px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:1px}
.header p{color:#9ca3af;font-size:14px}
.upload-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.upload-box{background:rgba(30,30,60,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px dashed rgba(99,102,241,0.3);border-radius:20px;padding:28px 20px 22px;text-align:center;cursor:pointer;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.upload-box:hover{border-color:rgba(129,140,248,0.7);transform:translateY(-3px);box-shadow:0 12px 40px rgba(99,102,241,0.15)}
.upload-box.has-image{border-style:solid;border-color:rgba(52,211,153,0.5);background:rgba(20,60,45,0.4)}
.upload-box.has-image::after{content:'✅ 已上传';position:absolute;top:10px;right:14px;font-size:11px;color:#34d399;font-weight:600}
.upload-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;background:rgba(99,102,241,0.12)}
.upload-box h3{font-size:15px;color:#e0e7ff;margin-bottom:6px;font-weight:600}
.upload-box .hint{font-size:12px;color:#6b7280;line-height:1.7}
.preview-img{max-width:100%;max-height:130px;border-radius:12px;margin-top:14px;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.upload-input{display:none}
.ctx-menu{display:none;position:fixed;background:rgba(30,30,60,0.97);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,0.25);border-radius:14px;padding:6px;z-index:9999;min-width:175px;box-shadow:0 16px 50px rgba(0,0,0,0.5)}
.ctx-menu.show{display:block}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;cursor:pointer;font-size:13px;color:#d1d5db;transition:all 0.2s}
.ctx-item:hover{background:rgba(99,102,241,0.15);color:#e0e7ff}
.ctx-sep{height:1px;background:rgba(99,102,241,0.12);margin:4px 8px}
.toast-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:9998}
.toast-overlay.show{display:flex;align-items:center;justify-content:center}
.paste-toast{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,30,65,0.98);backdrop-filter:blur(24px);border:1px solid rgba(99,102,241,0.3);border-radius:22px;padding:32px 36px;z-index:9999;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.paste-toast.show{display:block}
.paste-toast h4{font-size:17px;color:#e0e7ff;margin-bottom:22px;font-weight:700}
.toast-btns{display:flex;gap:12px;justify-content:center}
.toast-btn{padding:11px 26px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.25s}
.toast-btn.gmv-btn{background:linear-gradient(135deg,#6366f1,#818cf8);color:white}
.toast-btn.top10-btn{background:linear-gradient(135deg,#059669,#34d399);color:white}
.toast-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.btn-generate{display:block;width:100%;max-width:480px;margin:0 auto 28px;padding:18px;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);color:white;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,0.35);transition:all 0.35s;letter-spacing:2px;position:relative;overflow:hidden}
.btn-generate:hover{transform:translateY(-3px);box-shadow:0 14px 48px rgba(99,102,241,0.5)}
.btn-generate:disabled{background:#374151;cursor:not-allowed;box-shadow:none;transform:none}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{display:none;max-width:480px;margin:-16px auto 22px;padding:12px 18px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:#fca5a5;font-size:13px;text-align:center}
.error-msg.show{display:block}
.result-section{background:rgba(30,30,65,0.75);backdrop-filter:blur(16px);border:1px solid rgba(99,102,241,0.18);border-radius:22px;padding:30px;display:none;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.result-section.show{display:block;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(99,102,241,0.12)}
.result-header h3{font-size:18px;color:#e0e7ff;font-weight:700}
.copy-btn{padding:9px 22px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:#a5b4fc;font-size:13.5px;font-weight:600;cursor:pointer;transition:all 0.25s}
.copy-btn:hover{background:rgba(99,102,241,0.28);color:white;border-color:rgba(99,102,241,0.55)}
.copy-btn.copied{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);color:#34d399}
.report-box{background:rgba(15,15,35,0.7);border:1px solid rgba(99,102,241,0.1);border-radius:16px;padding:24px 28px;font-size:14.5px;line-height:2;color:#d1d5db;white-space:pre-wrap;font-family:'PingFang SC','Microsoft YaHei',monospace;max-height:520px;overflow-y:auto}
.report-box::-webkit-scrollbar{width:5px}
.report-box::-webkit-scrollbar-track{background:transparent}
.report-box::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:3px}
.footer{text-align:center;margin-top:40px;padding-bottom:24px;font-size:12px;color:#4b5563}
@media(max-width:640px){.upload-section{grid-template-columns:1fr}.header h1{font-size:26px}.result-section{padding:20px 16px}.report-box{padding:16px;font-size:13px}}
</style>
</head>
<body>

<div class="container">
<div class="header">
<div class="badge">✨ AI 智能识别</div>
<h1>GMV 日报生成器</h1>
<p>粘贴或上传直播数据截图，一键生成标准格式日报</p>
</div>

<div class="upload-section">
<div class="upload-box" id="gmvBox">
<div class="upload-icon">📊</div>
<h3>GMV 数据截图</h3>
<div class="hint">点击 / 右键 / 拖拽 / Ctrl+V<br>任意方式上传</div>
<input type="file" class="upload-input" id="gmvInput" accept="image/*">
<img class="preview-img" id="gmvPreview">
</div>
<div class="upload-box" id="top10Box">
<div class="upload-icon">🛒</div>
<h3>Top10 商品截图</h3>
<div class="hint">点击 / 右键 / 拖拽 / Ctrl+V<br>任意方式上传</div>
<input type="file" class="upload-input" id="top10Input" accept="image/*">
<img class="preview-img" id="top10Preview">
</div>
</div>

<button class="btn-generate" id="genBtn" onclick="generateReport()">
<span class="spinner" id="spinner"></span>
<span id="btnText">⚡ 生成日报</span>
</button>

<div class="error-msg" id="errorMsg"></div>

<div class="result-section" id="resultSection">
<div class="result-header">
<h3>📝 生成结果</h3>
<button class="copy-btn" id="copyBtn" onclick="copyReport()">📋 复制报告</button>
</div>
<div class="report-box" id="reportBox"></div>
</div>

<div class="footer">GMV 日报生成器 · Powered by AI</div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
<div class="ctx-item" onclick="handleCtx('paste')">📋 粘贴图片</div>
<div class="ctx-item" onclick="handleCtx('upload')">📂 上传图片文件</div>
<div class="ctx-sep"></div>
<div class="ctx-item" onclick="handleCtx('clear')">🗑️ 清除图片</div>
</div>

<!-- Paste Toast -->
<div class="toast-overlay" id="toastOverlay"></div>
<div class="paste-toast" id="pasteToast">
<h4>🖼️ 检测到截图，请选择类型</h4>
<div class="toast-btns">
<button class="toast-btn gmv-btn" onclick="confirmPaste('gmv')">📊 GMV 数据</button>
<button class="toast-btn top10-btn" onclick="confirmPaste('top10')">🛒 Top10 商品</button>
</div>
</div>

<script>
let gmvB64 = null, top10B64 = null, ctxWhich = null, pasteWhich = null;

// ===== Upload setup =====
function setup(boxId, inpId, prevId, isGmv) {
    const box = document.getElementById(boxId);
    const inp = document.getElementById(inpId);
    const prev = document.getElementById(prevId);
    box.onclick = (e) => { if (e.target.tagName !== 'IMG') inp.click(); };
    inp.onchange = () => { if (inp.files[0]) loadImg(inp.files[0], prev, isGmv, box); };
    box.ondragover = (e) => { e.preventDefault(); box.style.borderColor = '#818cf8'; };
    box.ondragleave = () => { box.style.borderColor = ''; };
    box.ondrop = (e) => { e.preventDefault(); box.style.borderColor = ''; if (e.dataTransfer.files[0]) loadImg(e.dataTransfer.files[0], prev, isGmv, box); };
}
function loadImg(file, prev, isGmv, box) {
    if (!file.type.startsWith('image/')) return alert('请上传图片');
    const r = new FileReader();
    r.onload = (e) => {
        prev.src = e.target.result;
        prev.style.display = 'block';
        box.classList.add('has-image');
        const b64 = e.target.result.split(',')[1] || '';
        if (isGmv) gmvB64 = b64; else top10B64 = b64;
    };
    r.readAsDataURL(file);
}
setup('gmvBox', 'gmvInput', 'gmvPreview', true);
setup('top10Box', 'top10Input', 'top10Preview', false);

// ===== Context menu =====
document.getElementById('gmvBox').oncontextmenu = (e) => { e.preventDefault(); ctxWhich = 'gmv'; showCtx(e); };
document.getElementById('top10Box').oncontextmenu = (e) => { e.preventDefault(); ctxWhich = 'top10'; showCtx(e); };
function showCtx(e) {
    const m = document.getElementById('ctxMenu');
    m.style.left = e.pageX + 'px'; m.style.top = e.pageY + 'px';
    m.classList.add('show');
}
document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('show'));
function handleCtx(act) {
    document.getElementById('ctxMenu').classList.remove('show');
    const isG = ctxWhich === 'gmv';
    const box = document.getElementById(isG ? 'gmvBox' : 'top10Box');
    const inp = document.getElementById(isG ? 'gmvInput' : 'top10Input');
    const prev = document.getElementById(isG ? 'gmvPreview' : 'top10Preview');
    if (act === 'paste') doPaste(isG);
    else if (act === 'upload') inp.click();
    else if (act === 'clear') {
        if (isG) gmvB64 = null; else top10B64 = null;
        inp.value = ''; prev.style.display = 'none'; box.classList.remove('has-image');
    }
}

// ===== Paste =====
document.addEventListener('paste', (e) => {
    const items = e.clipboardData ? e.clipboardData.items : null;
    if (!items) return;
    for (const it of items) {
        if (it.type && it.type.startsWith('image/')) {
            e.preventDefault();
            const f = it.getAsFile();
            if (f) routePaste(f);
            return;
        }
    }
});
function routePaste(file) {
    if (!gmvB64 && !top10B64) {
        // ask
        document.getElementById('toastOverlay').classList.add('show');
        document.getElementById('pasteToast').classList.add('show');
        pasteWhich = null;
    } else if (!gmvB64) {
        loadImg(file, document.getElementById('gmvPreview'), true, document.getElementById('gmvBox'));
    } else if (!top10B64) {
        loadImg(file, document.getElementById('top10Preview'), false, document.getElementById('top10Box'));
    } else {
        // both filled, ask
        document.getElementById('toastOverlay').classList.add('show');
        document.getElementById('pasteToast').classList.add('show');
        pasteWhich = null;
    }
}
function doPaste(isGmv) {
    navigator.clipboard.read().then(items => {
        for (const it of items) {
            for (const t of it.types) {
                if (t.startsWith('image/')) {
                    it.getType(t).then(blob => {
                        const f = new File([blob], 'paste.png');
                        if (pasteWhich) {
                            const isG = pasteWhich === 'gmv';
                            loadImg(f, document.getElementById(isG ? 'gmvPreview' : 'top10Preview'), isG, document.getElementById(isG ? 'gmvBox' : 'top10Box'));
                        } else {
                            loadImg(f, document.getElementById(isGmv ? 'gmvPreview' : 'top10Preview'), isGmv, document.getElementById(isGmv ? 'gmvBox' : 'top10Box'));
                        }
                    });
                    return;
                }
            }
        }
    }).catch(() => alert('无法读取剪贴板，请尝试点击上传'));
}
function confirmPaste(type) {
    document.getElementById('toastOverlay').classList.remove('show');
    document.getElementById('pasteToast').classList.remove('show');
    pasteWhich = type;
    doPaste(type === 'gmv');
}

// ===== Generate =====
async function generateReport() {
    if (!gmvB64 && !top10B64) { showErr('请至少上传一张截图'); return; }
    const btn = document.getElementById('genBtn');
    const spin = document.getElementById('spinner');
    btn.disabled = true; spin.style.display = 'inline-block';
    document.getElementById('errorMsg').classList.remove('show');
    try {
        const payload = {};
        if (gmvB64) payload.gmv_image = gmvB64;
        if (top10B64) payload.top10_image = top10B64;
        const resp = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!resp.ok) throw new Error('服务器错误 ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.error || '生成失败');
        showRes(data.report);
    } catch(err) {
        showErr('生成失败：' + err.message);
    } finally {
        btn.disabled = false; spin.style.display = 'none';
    }
}
function showErr(msg) {
    const e = document.getElementById('errorMsg');
    e.textContent = msg; e.classList.add('show');
}
function showRes(text) {
    document.getElementById('reportBox').textContent = text;
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}
function copyReport() {
    const text = document.getElementById('reportBox').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 复制报告'; btn.classList.remove('copied'); }, 2000);
    });
}
</script>
</body>
</html>
